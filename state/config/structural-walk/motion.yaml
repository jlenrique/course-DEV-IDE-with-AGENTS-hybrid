workflow: motion
title: Motion-enabled narrated workflow
walk_type: Structural walk (motion-enabled narrated workflow, deterministic default)
cross_cutting:
  - component: Marcus orchestrator
    path: skills/bmad-agent-marcus/SKILL.md
  - component: Marcus production-plan generator
    path: skills/bmad-agent-marcus/scripts/generate-production-plan.py
  - component: Marcus workflow template registry
    path: skills/bmad-agent-marcus/references/workflow-templates.yaml
    check_mode: yaml
  - component: Production coordination
    path: skills/production-coordination/scripts/manage_baton.py
  - component: Fidelity assessor
    path: skills/bmad-agent-fidelity-assessor/SKILL.md
  - component: Quality reviewer
    path: skills/bmad-agent-quality-reviewer/SKILL.md
  - component: Quality reviewer sidecar
    path: _bmad/memory/quinn-r-sidecar
  - component: Marcus sidecar
    path: _bmad/memory/marcus-sidecar
  - component: Contract validator
    path: scripts/validate_fidelity_contracts.py
  - component: Motion planning
    path: skills/production-coordination/scripts/motion_plan.py
  - component: Motion execution skill
    path: skills/kling-video/SKILL.md
  - component: Motion execution script
    path: skills/kling-video/scripts/kling_operations.py
  - component: Motion manifest hydration
    path: skills/bmad-agent-content-creator/scripts/manifest_visual_enrichment.py
  - component: Motion perception contract
    path: skills/bmad-agent-content-creator/scripts/perception_contract.py
  - component: Creative directive contract
    path: skills/bmad-agent-cd/references/creative-directive-contract.md
  - component: Experience profiles registry
    path: state/config/experience-profiles.yaml
    check_mode: yaml
  - component: Parameter registry schema
    path: state/config/parameter-registry-schema.yaml
    check_mode: yaml
anti_drift:
  - name: Literal-visual payload rules in artifacts contract
    path: docs/workflow/trial-run-pass2-artifacts-contract.md
    needles:
      - "For literal-visual slides, `content` must be URL-only"
      - "Literal-visual presentation policy is full-slide image-only."
  - name: Literal-visual operator packet contract
    path: docs/workflow/trial-run-pass2-artifacts-contract.md
    needles:
      - "## 10) literal-visual-operator-packet.md"
      - "literal-visual-operator-packet.md (required when any literal-visual slide exists)"
    ordered: true
  - name: Operator card 6B checkpoint
    path: docs/workflow/production-operator-card-v4.md
    needles:
      - "### 6B. Prompt 6B"
      - "Confirm `literal-visual-operator-packet.md` exists and is complete for every literal-visual slide."
    ordered: true
  # Ordered by prompt-pack numeric sequence (4 < 04A < 4.75 < 6.2 < 6.3 < 7.5 < 7C < 7D < 7F)
  # so test-fixture doc builders and the real prompt-pack doc both satisfy
  # the sequence_doc_parity monotonic-position check below.
  - name: Lesson-plan coauthoring 04A step in motion prompt pack
    path: docs/workflow/production-prompt-pack-v4.2-narrated-lesson-with-video-or-animation.md
    needles:
      - "## 04) Ingestion Quality Gate + Irene Packet"
      - "## 04A) Lesson Plan Coauthoring + Scope Lock (Marcus <-> HIL)"
      - "## 4.75) Creative Directive Resolution (CD)"
    ordered: true
  - name: Creative directive resolution step
    path: docs/workflow/production-prompt-pack-v4.2-narrated-lesson-with-video-or-animation.md
    needles:
      - "## 4.75) Creative Directive Resolution (CD)"
      - "creative-directive.yaml"
      - "narration_profile_controls"
    ordered: true
  - name: Operator card 04A checkpoint
    path: docs/workflow/production-operator-card-v4.md
    needles:
      - "### 04A. Prompt 04A: Lesson Plan Coauthoring + Scope Lock"
      - "Go/no-go: no go until 04A is complete and the locked plan revision is confirmed."
    ordered: true
  - name: Session launcher 04A anti-drift control
    path: docs/workflow/production-session-launcher.md
    needles:
      - "Prompt 04A Lesson Plan coauthoring + scope-lock checkpoint between Prompt 4 and Prompt 4.75."
  - name: Marcus workflow template 04A stage invariant
    path: skills/bmad-agent-marcus/references/workflow-templates.yaml
    needles:
      - "stage: \"lesson-plan-coauthoring-04a\""
  - name: Cluster prompt engineering step
    path: docs/workflow/production-prompt-pack-v4.2-narrated-lesson-with-video-or-animation.md
    needles:
      - "## 6.2) Cluster Prompt Engineering (Conditional)"
      - "cluster_prompt_engineering.py"
    ordered: true
  - name: Cluster dispatch sequencing step
    path: docs/workflow/production-prompt-pack-v4.2-narrated-lesson-with-video-or-animation.md
    needles:
      - "## 6.3) Cluster Dispatch Sequencing (Conditional)"
      - "cluster_dispatch_sequencing.py"
    ordered: true
  - name: Cluster coherence gate in motion prompt pack
    path: docs/workflow/production-prompt-pack-v4.2-narrated-lesson-with-video-or-animation.md
    needles:
      - "## 7.5) Cluster Coherence G2.5 Gate (Conditional)"
      - "cluster_coherence_validation.py"
    ordered: true
  - name: Motion prompt-pack workflow sequence
    path: docs/workflow/production-prompt-pack-v4.2-narrated-lesson-with-video-or-animation.md
    needles:
      - "## 07C) Storyboard A + Gate 2 Approval + Winner Authorization"
      - "## 07D) Gate 2M Motion Designation"
      - "## 07F) Motion Gate"
      - "Regenerate Storyboard B with script context before downstream audio finalization."
    ordered: true
  - name: Motion prompt-pack winner-deck binding
    path: docs/workflow/production-prompt-pack-v4.2-narrated-lesson-with-video-or-animation.md
    needles:
      - "Motion planning and Irene Pass 2 must consume the authorized winner deck, not unresolved A/B variants."
  - name: Operator card motion checkpoints
    path: docs/workflow/production-operator-card-v4.md
    needles:
      - "### 7D. Prompt 7D: Gate 2M Motion Designation"
      - "### 7F. Prompt 7F: Motion Gate"
    ordered: true
  - name: Operations context experience-profile invariant
    path: docs/operations-context.md
    needles:
      - "EXPERIENCE_PROFILE"
      - "narration_profile_controls"
sequence_doc_parity:
  # Listed in Marcus-stage order so the structural_walk validator's sort-by-stage
  # aligns with doc-position sort (and the test fixture's naive doc-builder
  # produces a doc where needles are in the right order by construction).
  - stage: lesson-plan-coauthoring-04a
    path: docs/workflow/production-prompt-pack-v4.2-narrated-lesson-with-video-or-animation.md
    needle: "## 04A) Lesson Plan Coauthoring + Scope Lock (Marcus <-> HIL)"
  - stage: lesson-plan-coauthoring-04a
    path: docs/workflow/production-operator-card-v4.md
    needle: "### 04A. Prompt 04A: Lesson Plan Coauthoring + Scope Lock"
  - stage: creative-directive
    path: docs/workflow/production-prompt-pack-v4.2-narrated-lesson-with-video-or-animation.md
    needle: "## 4.75) Creative Directive Resolution (CD)"
  - stage: cluster-prompt-engineering
    path: docs/workflow/production-prompt-pack-v4.2-narrated-lesson-with-video-or-animation.md
    needle: "## 6.2) Cluster Prompt Engineering (Conditional)"
  - stage: cluster-dispatch-sequencing
    path: docs/workflow/production-prompt-pack-v4.2-narrated-lesson-with-video-or-animation.md
    needle: "## 6.3) Cluster Dispatch Sequencing (Conditional)"
  - stage: cluster-coherence
    path: docs/workflow/production-prompt-pack-v4.2-narrated-lesson-with-video-or-animation.md
    needle: "## 7.5) Cluster Coherence G2.5 Gate (Conditional)"
  - stage: storyboard
    path: docs/workflow/production-prompt-pack-v4.2-narrated-lesson-with-video-or-animation.md
    needle: "## 07C) Storyboard A + Gate 2 Approval + Winner Authorization"
  - stage: gate-2m
    path: docs/workflow/production-prompt-pack-v4.2-narrated-lesson-with-video-or-animation.md
    needle: "## 07D) Gate 2M Motion Designation"
  - stage: gate-2m
    path: docs/workflow/production-operator-card-v4.md
    needle: "### 7D. Prompt 7D: Gate 2M Motion Designation"
  - stage: motion-gate
    path: docs/workflow/production-prompt-pack-v4.2-narrated-lesson-with-video-or-animation.md
    needle: "## 7F) Motion Gate"
  - stage: motion-gate
    path: docs/workflow/production-operator-card-v4.md
    needle: "### 7F. Prompt 7F: Motion Gate"
  - stage: narration-and-manifest
    path: docs/workflow/production-prompt-pack-v4.2-narrated-lesson-with-video-or-animation.md
    needle: "Regenerate Storyboard B with script context before downstream audio finalization."
dry_run:
  steps:
    - key: manifest-resolution
      label: Manifest resolution and shape check
      scope: motion
      input: state/config/structural-walk/motion.yaml
      kind: manifest
    - key: sequence-preview
      label: Marcus workflow sequence preview
      scope: motion
      input: skills/bmad-agent-marcus/references/workflow-templates.yaml:narrated-lesson-with-video-or-animation
      kind: sequence
    - key: sequence-doc-parity
      label: Marcus sequence-to-document parity
      scope: motion
      input: state/config/structural-walk/motion.yaml:sequence_doc_parity
      kind: sequence_docs
