        amount: minimal
        audience: >-
          Faculty and instructional designers familiar with Canvas and course design,
          American English
        tone: Clear, professional, engaging in American English
        language: en
      visuals:
        image_source: aiGenerated
        image_model: null
        style_preset: illustration
        custom_style: null
        keywords:
        - vector
        - minimalist
        - flat-color
        - linework
        - bold
    page_settings:
      card_options:
        dimensions: fluid
    presentation:
      # Leg-D D-3: additive probe marker — scaffolding must not masquerade as an
