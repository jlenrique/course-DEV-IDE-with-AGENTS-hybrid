# CD (Dan) authors these records THROUGH Marcus's envelope; the validator
# (scripts/utilities/validate_gamma_style_guides.py) is the write-gate. Never edit
# state/config directly outside that path.
#
# Schema per §7 three categories:
#   * prompt_configuration  (text + visuals surface; Classic/API only)
#   * page_settings         (card_options / export)
#   * foundational          theme (api) XOR studio_template (studio) via production_mode
