        content_alignment: middle
        font_size: M
        show_card_backdrops: false
        animations: true
        card_headers_footers: not_configured
    presentation:
      display_name: HIL 2026 APC Crossroads Classic
      distinguishing: >-
        The new standard 'A' style: a calm clinician-crossroads register on the Tejal
        theme with GPT Image 2 Mini illustration — condensed prose, spacious white
        cards, and on-message metaphor imagery driven by the slide's Illustration brief.
      narrative:
        summary: >-
          A Classic presentation candidate captured from the LEON model-selection
          evidence: Tejal theme, AI illustration, GPT Image 2 Mini, Default/Fluid
          page setup, large cards, centered content, medium type, no backdrops,
          animations on.
        feels_like: Calm, hopeful, clinical-education illustration with a single clear metaphor.
        use_when: >-
          Opening or case-for-change slides where a clinician-facing crossroads
          metaphor should feel accessible, clean, and emotionally hopeful.
        avoid_when: >-
          Dense reference slides, data tables, or styles that require verified
          text-in-image accuracy.
        triad_rationale: >-
          The Tejal theme, illustration preset with GPT Image 2 Mini, and
          Default/Fluid page setup agree on a calm clinical metaphor style; the
          screenshot-observed card options (L width, middle alignment, M font,
          no backdrops, animations on) are preserved as style evidence even
          though only dimensions is currently runtime-bound.
      example_url: "https://a-clinician-at-the-cross-eyjrmid.gamma.site/"
      thumbnail_ref: state/config/gamma-styleguide-thumbnails/hil-2026-apc-crossroads-classic.png
      last_used: null
    coherence:
      theme_art_keywords_dimensions: >-
        Tejal theme + AI-generated illustration + GPT Image 2 Mini + Default/Fluid
        page setup; screenshot-observed Page setup: L card width, middle content
        alignment, M font size, card backdrops off, animations on, card headers
        and footers not configured.
    provenance:
      source: model-hunt-v3_LEON
      established: '2026-07-03'
      notes: >-
        Stub built from LEON evidence screenshots at
        _bmad-output/implementation-artifacts/evidence/model-hunt-v3_LEON/GPT Image 2 Mini/.
