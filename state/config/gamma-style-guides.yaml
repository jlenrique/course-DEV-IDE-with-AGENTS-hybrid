  # -- Candidate stub (LEON model-selection evidence; screenshot-derived fields) --
  hil-2026-apc-crossroads-classic:
    production_mode: api
    # Canonicalized 2026-07-03 as the new STANDARD 'A' style. Validated end-to-end through
    # Gary's authentic seam: the gold-standard "A Clinician at the Crossroads" slide
    # rendered clean, English-labeled, on-message (evidence
    # crossroads-goldstandard-20260703T041136Z). LESSON (see gamma-style-control-map.md
    # §Style-development lessons): image quality depends on the per-slide `Illustration:`
    # brief carried in the slide CONTENT (source design-notes); the instruction-neutral
    # strip exposed gpt-image-2-mini's raw CJK default precisely because it carries no
    # such brief.
    lifecycle: permanent
    version: 1
    theme:
      id: njim9kuhfnljvaa
      name: 2026 HIL APC Tejal
    studio_template: null
    prompt_configuration:
      text_content:
        mode: condense
        amount: minimal
        audience: null
        tone: null
        language: en
      visuals:
        image_source: aiGenerated
        image_model: gpt-image-2-mini
        style_preset: illustration
        custom_style: null
        keywords: []
      # additional_instructions intentionally omitted: the text captured in the
      # screenshot was Gary's OWN hardcoded card-structure rule (which Gary always
      # appends at packet-build), NOT authored style-voice prose — echoing it here is
      # redundant and trips gamma.prose.echoes-param. Candidate for the
      # deliberately-unused sentinel once that QC convention lands (task #8).
    page_settings:
      card_options:
        dimensions: fluid
      # UI-only reference — page-setup controls the operator set in the Gamma editor that
      # have NO Generate-API field (or that Gary does not wire), so they are NOT
      # runtime-bound and Gary cannot send them (matrix §5.A/§5.B). Kept for fidelity to
      # the authored look + future use; grouped here so they do not read as active
      # settings. (`card_headers_footers` DOES have an API field — cardOptions.headerFooter
