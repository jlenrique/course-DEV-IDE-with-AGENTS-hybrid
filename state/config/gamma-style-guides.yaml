      thumbnail_ref: null
      last_used: null
    coherence:
      theme_art_keywords_dimensions: >-
        Professional clinical APC look; Tejal theme + AI-generated illustration/
        vector-minimalist cues; Default/Fluid page setup; multi-beat cadence via
        the scripted floor.
    scripted:
    - class: min_cluster_floor
      value: 8
      rationale: >-
        This style reads as a multi-beat narrative walk; below eight beats it
