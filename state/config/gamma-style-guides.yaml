# CD-owned Gamma Styleguide Library — RUNTIME-ACTIVE SSOT.
#
# Promoted from _bmad-output/planning-artifacts/gamma-style-guides-v1-draft-2026-07-01.yaml
# (Leg-A, arc dev/gamma-styleguide-library-2026-07-01). This file is the SOLE
# determinant of the Gamma look/feel for a real SPOC-orchestrated deck; it replaces
# the DEFAULT_VARIANT_PAIR "SMOKE FIXTURE" authority and the removed baked-in 16:9
# override at app/specialists/gary/_act.py.
#
# CD (Dan) authors these records THROUGH Marcus's envelope; the validator
# (scripts/utilities/validate_gamma_style_guides.py) is the write-gate. Never edit
# state/config directly outside that path.
#
# Schema per §7 three categories:
#   * prompt_configuration  (text + visuals surface; Classic/API only)
#   * page_settings         (card_options / export)
#   * foundational          theme (api) XOR studio_template (studio) via production_mode
# plus an additive `presentation` metadata block (completeness-EXCLUDED, additive-safe)
# and an optional `scripted` block (schema-declared here, wiring is Leg C).
schema_version: "1.0"
registry_owner: cd
source_draft: _bmad-output/planning-artifacts/gamma-style-guides-v1-draft-2026-07-01.yaml

style_guides:
  # -- Candidate stub (LEON model-selection evidence; screenshot-derived fields) --
  hil-2026-apc-crossroads-classic:
    production_mode: api
    # Canonicalized 2026-07-03 as the new STANDARD 'A' style. Validated end-to-end through
    # Gary's authentic seam: the gold-standard "A Clinician at the Crossroads" slide
    # rendered clean, English-labeled, on-message (evidence
    # crossroads-goldstandard-20260703T041136Z). LESSON (see gamma-style-control-map.md
    # §Style-development lessons): image quality depends on the per-slide `Illustration:`
    # brief carried in the slide CONTENT (source design-notes); the instruction-neutral
    # strip exposed gpt-image-2-mini's raw CJK default precisely because it carries no
    # such brief.
    lifecycle: permanent
    version: 1
    theme:
      id: njim9kuhfnljvaa
      name: 2026 HIL APC Tejal
    studio_template: null
    prompt_configuration:
      text_content:
        mode: condense
        amount: minimal
        audience: null
        tone: null
        language: en
      visuals:
        image_source: aiGenerated
        image_model: gpt-image-2-mini
        style_preset: illustration
        custom_style: null
        keywords: []
      # additional_instructions intentionally omitted: the text captured in the
      # screenshot was Gary's OWN hardcoded card-structure rule (which Gary always
      # appends at packet-build), NOT authored style-voice prose — echoing it here is
      # redundant and trips gamma.prose.echoes-param. Candidate for the
      # deliberately-unused sentinel once that QC convention lands (task #8).
    page_settings:
      card_options:
        dimensions: fluid
      # UI-only reference — page-setup controls the operator set in the Gamma editor that
      # have NO Generate-API field (or that Gary does not wire), so they are NOT
      # runtime-bound and Gary cannot send them (matrix §5.A/§5.B). Kept for fidelity to
      # the authored look + future use; grouped here so they do not read as active
      # settings. (`card_headers_footers` DOES have an API field — cardOptions.headerFooter
      # — but Gary does not wire it yet.)
      ui_only_reference:
        card_width: L
        content_alignment: middle
        font_size: M
        show_card_backdrops: false
        animations: true
        card_headers_footers: not_configured
    presentation:
      display_name: HIL 2026 APC Crossroads Classic
      distinguishing: >-
        The new standard 'A' style: a calm clinician-crossroads register on the Tejal
        theme with GPT Image 2 Mini illustration — condensed prose, spacious white
        cards, and on-message metaphor imagery driven by the slide's Illustration brief.
      narrative:
        summary: >-
          A Classic presentation candidate captured from the LEON model-selection
          evidence: Tejal theme, AI illustration, GPT Image 2 Mini, Default/Fluid
          page setup, large cards, centered content, medium type, no backdrops,
          animations on.
        feels_like: Calm, hopeful, clinical-education illustration with a single clear metaphor.
        use_when: >-
          Opening or case-for-change slides where a clinician-facing crossroads
          metaphor should feel accessible, clean, and emotionally hopeful.
        avoid_when: >-
          Dense reference slides, data tables, or styles that require verified
          text-in-image accuracy.
        triad_rationale: >-
          The Tejal theme, illustration preset with GPT Image 2 Mini, and
          Default/Fluid page setup agree on a calm clinical metaphor style; the
          screenshot-observed card options (L width, middle alignment, M font,
          no backdrops, animations on) are preserved as style evidence even
          though only dimensions is currently runtime-bound.
      example_url: "https://a-clinician-at-the-cross-eyjrmid.gamma.site/"
      thumbnail_ref: state/config/gamma-styleguide-thumbnails/hil-2026-apc-crossroads-classic.png
      last_used: null
    coherence:
      theme_art_keywords_dimensions: >-
        Tejal theme + AI-generated illustration + GPT Image 2 Mini + Default/Fluid
        page setup; screenshot-observed Page setup: L card width, middle content
        alignment, M font size, card backdrops off, animations on, card headers
        and footers not configured.
    provenance:
      source: model-hunt-v3_LEON
      established: '2026-07-03'
      notes: >-
        Stub built from LEON evidence screenshots at
        _bmad-output/implementation-artifacts/evidence/model-hunt-v3_LEON/GPT Image 2 Mini/.
        Prompt editor evidence shows theme "2026 HIL APC (Tejal)", AI images,
        Illustration art style, GPT Image 2 Mini, Presentation format, Classic
        card design mode, Card-by-card content entry, and visible additional
        instructions. Page setup evidence shows Presentation, Default/Fluid,
        card width L, middle content alignment, font size M, show card backdrops
        off, animations on, and empty Card headers & footers add-elements area.
        The folder name was corrected from an out-of-date Nano Banana label to
        GPT Image 2 Mini. Later Prompt editor evidence shows Text content set to
        Condense with Amount of text set to Minimal.

  # -- B counterpart of the standard-'A' crossroads style: SAME style, Blueprint theme --
  hil-2026-apc-crossroads-blueprint:
    production_mode: api
    # Created 2026-07-03 (operator-directed): the crossroads standard-'A' style with the theme
    # swapped to Blueprint Editorial (e8tz1vxb9v1urqp) for an A/B palette pair.
    # PROMOTED to permanent 2026-07-03 (session-09): image model swapped gpt-image-2-mini ->
    # recraft-v3 (the two-arm trial crossroads-blueprint-twoarm-20260703T064100Z proved
    # gpt-image-2-mini renders Japanese text on this style even with a hardened language lock,
    # while recraft-v3 renders clean Western illustration; the operator's exemplar deck uses
    # the recraft-v3 look). The Western/English no-iconography steer is baked into
    # additional_instructions so production stays clean.
    lifecycle: permanent
    version: 1
    theme:
      id: e8tz1vxb9v1urqp
      name: Blueprint Editorial
    studio_template: null
    prompt_configuration:
      text_content:
        mode: condense
        amount: minimal
        audience: null
        tone: null
        language: en
      visuals:
        image_source: aiGenerated
        image_model: recraft-v3
        style_preset: illustration
        custom_style: null
        keywords: []
      additional_instructions:
      - >-
        Contemporary Western / North American clinical setting; no cultural, national, or
        religious iconography or symbolism. All text, signage, or lettering visible in the
        image must be English only - do NOT render Japanese, Chinese, Korean, or other
        non-Latin characters or Asian-language signage; prefer no in-image text, and any
        unavoidable text must be brief, legible American English. Generous white space.
    page_settings:
      card_options:
        dimensions: fluid
      # UI-only reference (see the A style) — not runtime-bound; kept for fidelity.
      ui_only_reference:
        card_width: L
        content_alignment: middle
        font_size: M
        show_card_backdrops: false
        animations: true
        card_headers_footers: not_configured
    presentation:
      display_name: HIL 2026 APC Crossroads — Blueprint palette
      distinguishing: >-
        The 'B' counterpart to the standard-'A' crossroads style: the SAME calm
        clinician-crossroads illustration (recraft-v3), re-themed with Blueprint Editorial
        for a cooler-palette A/B choice at the Storyboard gate.
      narrative:
        summary: >-
          The crossroads style on the Blueprint Editorial theme: same condensed prose and
          clinician-crossroads illustration register (recraft-v3), Default/Fluid pages -
          only the palette and typography change, so A/B selection is a same-style,
          alternate-palette choice.
        feels_like: Calm crossroads illustration in a cooler, editorial Blueprint palette.
        use_when: >-
          As the 'B' option paired with crossroads-A when the operator wants to choose
          between two palette treatments of the same style.
        avoid_when: >-
          When a genuinely different register is wanted for A/B — use a distinct style
          (e.g. the lineArt/technical hil-2026-apc-blueprint-classic) instead.
        triad_rationale: >-
          Blueprint Editorial theme + illustration preset + recraft-v3 + Default/Fluid pages.
          PROVEN 2026-07-03: recraft-v3 renders clean Western illustration on the Blueprint
          palette (the gpt-image-2-mini Japanese-text problem drove the model swap); the
          operator's exemplar deck confirms the palette reads well.
      example_url: "https://foundations-of-the-innov-516svqx.gamma.site/"
      thumbnail_ref: state/config/gamma-styleguide-thumbnails/hil-2026-apc-crossroads-blueprint.png
      last_used: null
    coherence:
      theme_art_keywords_dimensions: >-
        Blueprint Editorial theme + AI-generated illustration + recraft-v3 + Default/Fluid
        pages. PROVEN clean Western illustration (session-09 two-arm trial + operator exemplar).
    provenance:
      source: crossroads-classic-theme-swap
      established: '2026-07-03'
      notes: >-
        Operator-directed B counterpart of hil-2026-apc-crossroads-classic: an identical
        record with the theme swapped Tejal (njim9kuhfnljvaa) -> Blueprint Editorial
        (e8tz1vxb9v1urqp), for A/B-paired deck selection in Storyboard. To be tuned toward
        a genuine-but-aesthetically-compatible difference and eyed live before promotion.

  # -- Studio-mode companion of the crossroads-blueprint style (studio-via-API override
  #    plumbing, session-10). Approach 1: a DISTINCT, self-contained studio record — NOT a
  #    re-composition of the Classic sibling. The base full-bleed Studio-B template carries
  #    per-record theme_id (Blueprint Editorial) + image_model (recraft-v3) OVERRIDES. Born
  #    CANDIDATE; promotion is operator-eye-gated (deferred). RENDER-PROVEN at the API level
  #    (trial crossroads-blueprint-studio-20260703T070021Z); production-seam live proof this
  #    session. This record's field-by-field mapping is the spec for the deferred
  #    Classic->Studio transformer skill.
  hil-2026-apc-crossroads-blueprint-studio:
    production_mode: studio
    lifecycle: candidate
    version: 1
    derived_from: hil-2026-apc-crossroads-blueprint
    authored_session:
      session: session-10
      date: '2026-07-03'
      author: Dan/CD
      source_sibling: hil-2026-apc-crossroads-blueprint
      notes: >-
        Reference Classic->Studio transformation: the crossroads-blueprint Classic style
        (recraft-v3 illustration on the Blueprint Editorial theme) delivered instead as a
        full-bleed 16:9 Studio image-card deck via the studio-via-API override plumbing.
    promotion_criteria: >-
      Candidate -> permanent ONLY after ALL of: (1) live Studio render captured with a
      retrievable pointer (gamma id / export url / thumbnail); (2) operator-eye verdict
      recorded; (3) micro-text legibility pass - zoom the baked data callouts and confirm
      they are legible, spelled, and un-garbled at delivery size (recraft-v3's known
      small-text weakness x Blueprint's micro-text density is the primary risk); (4)
      English-only confirmed, zero CJK leakage; (5) genuine full-bleed 16:9 (not
      letterboxed); (6) sibling-parity - the Classic crossroads-blueprint parent is
      resolved/promoted first (a companion may not outrank its parent).
    theme: null
    studio_template:
      gamma_id: g_nv5q4da69qiiu8q
      name: Studio B Gamma template (base full-bleed)
      source: runs/studio-trial/studio-b-gamma-settings.yaml
      # Per-record Studio overrides (studio-via-API override plumbing, session-10):
      theme_id: e8tz1vxb9v1urqp        # Blueprint Editorial theme override
      image_model: recraft-v3          # clean-Western image-model override
    studio_prompt_lock:
      wrapper_id: gary_studio_lock_wrapper_v1
      behavior: >-
        Lock design; keep one full-bleed image card; only swap subject to the new slide
        topic. The English-only text steer is enforced by the wrapper constant.
      guard:
        type: aspect_ratio_min
        min_ratio: 1.4
        expected_ratio: 1.7778
    prompt_configuration:
      # Studio records carry NO Classic visuals surface — the create-from-template plus the
      # theme_id/image_model overrides ARE the sole style authority. Only non-surface
      # template-lock instructions remain.
      additional_instructions:
      - Preserve the template's full-bleed image-card composition.
    presentation:
      display_name: HIL 2026 APC Crossroads — Blueprint (Studio)
      distinguishing: >-
        The Studio-mode companion of the crossroads-blueprint style: the SAME cooler
        Blueprint Editorial palette and clean-Western recraft-v3 illustration, delivered as
        a full-bleed 16:9 Studio image-card (title + key data embedded IN the illustration)
        rather than Classic typography.
      narrative:
        summary: >-
          A full-bleed Studio image-card deck on the base Studio-B template, re-themed to
          Blueprint Editorial and rendered with recraft-v3 via per-record overrides. The
          image carries the title and data; the template plus overrides are the style
          authority.
        feels_like: Immersive, single-image-per-slide crossroads in a cool editorial palette.
        use_when: >-
          A slide's meaning lives in one bold full-bleed illustration with embedded text and
          the Blueprint palette is wanted.
        avoid_when: >-
          Dense Classic typography or multi-block text is required, or the Classic
          crossroads-blueprint (per-slide illustration + real text) is the better fit.
        triad_rationale: >-
          Base Studio-B full-bleed template + Blueprint Editorial theme override
          (e8tz1vxb9v1urqp) + recraft-v3 image-model override; the aspect-ratio guard
          (min 1.4) proves the exported card kept the 16:9 frame. recraft-v3 renders clean
          Western illustration (gpt-image-2-mini renders Japanese on this crossroads subject).
      example_url: null
      thumbnail_ref: null
      last_used: null
    coherence:
      template_art_dimensions: >-
        Base Studio-B template (style authority) + Blueprint Editorial theme override +
        recraft-v3 image model + full-bleed 16:9. Classic text/card settings are forbidden
        on a studio record.
    provenance:
      source: crossroads-blueprint-classic-to-studio-transform
      established: '2026-07-03'
      runner_up:
        model: gpt-image-2-mini
        rejected_because: >-
          Renders Japanese text on this journey/crossroads subject even under a hardened
          "no Japanese/Chinese/Korean characters" language lock (session-09 two-arm trial
          crossroads-blueprint-twoarm-20260703T064100Z); recraft-v3 is the clean-Western fix.
      known_limitation: >-
        recraft-v3 garbles SMALL embedded/body text (observed session-10 production-seam
        live render crossroads-blueprint-studio-prodseam-20260703T155101Z: hero titles
        render clean and English, but small taglines/body garble - "Ciinical"/"Tansfornative"
        on card 1, gibberish body on card 2). BLOCKS promotion criterion-3 (micro-text
        legibility). Directed refinement (deferred-inventory): Arm-1 hero-title + large-
        callouts only, minimize small illegible body text (play to recraft-v3's strength);
        Arm-2 fallback = image_model swap. NOT accept-limitation - a promoted style with
        garbled body text would degrade the source-detail->Gamma conveyance invariant.
      notes: >-
        Approach-1 distinct self-contained studio record; the Studio companion of
        hil-2026-apc-crossroads-blueprint. RENDER-PROVEN at the API level (trial
        crossroads-blueprint-studio-20260703T070021Z); production-seam live proof session-10.
        PROMOTION-PENDING operator eye + micro-text legibility.

  # -- Art-style variant of the standard-'A' crossroads style: Digital Collage --
  hil-2026-apc-crossroads-digital-collage:
    production_mode: api
    # Created 2026-07-03 (operator-directed): the crossroads standard-'A' style copied
    # verbatim with ONLY the ART STYLE changed to "Digital Collage" (a named Gamma
    # Image-choices style, §2). "Digital Collage" is NOT one of the 6 legacy stylePreset
    # values, so it is routed through the CANONICAL free-text channel (imageOptions.style,
    # via custom_style) per matrix §6 — not the legacy stylePreset enum.
    # PROMOTED to permanent 2026-07-03 (session-09, operator-directed): a briefed live
    # re-render through Gary's authentic seam produced clean, on-brand, Western-neutral
    # digital collages on both image-warranted slides (title + vignette) of the standard
    # corpus style-test-strip-v1 (evidence digital-collage-briefed-20260703T062743Z). This
    # PROVES matrix §6 — the free-text `style` channel carries a NAMED art style on the wire
    # (imageOptions.style="Digital Collage", wire receipt captured) — and re-confirms the
    # content-brief lesson (matrix §8): un-briefed slides photo-grid and garble signage;
    # briefed slides render showcase collages. Model gpt-image-2-mini.
    # Reference: https://a-clinician-at-the-cross-krkt5b4.gamma.site/
    lifecycle: permanent
    version: 1
    theme:
      id: njim9kuhfnljvaa
      name: 2026 HIL APC Tejal
    studio_template: null
    prompt_configuration:
      text_content:
        mode: condense
        amount: minimal
        audience: null
        tone: null
        language: en
      visuals:
        image_source: aiGenerated
        image_model: gpt-image-2-mini
        # ART STYLE = "Digital Collage" via the canonical free-text channel (§6):
        # style_preset: custom routes custom_style -> imageOptions.style. (Not the legacy
        # stylePreset enum, which does not carry the named Image-choices styles.)
        style_preset: custom
        custom_style: "Digital Collage"
        keywords: []
      # additional_instructions intentionally omitted (same as the A style).
    page_settings:
      card_options:
        dimensions: fluid
      # UI-only reference (see the A style) — not runtime-bound; kept for fidelity.
      ui_only_reference:
        card_width: L
        content_alignment: middle
        font_size: M
        show_card_backdrops: false
        animations: true
        card_headers_footers: not_configured
    presentation:
      display_name: HIL 2026 APC Crossroads Digital Collage
      distinguishing: >-
        The crossroads standard-'A' style with its art style changed to Digital Collage:
        same Tejal theme, GPT Image 2 Mini, condensed prose and Fluid pages — only the
        illustration register changes, for a distinct A/B or roster option.
      narrative:
        summary: >-
          The crossroads style rendered in a Digital Collage art style: layered, textured,
          collage-composed imagery on the Tejal theme; same condensed prose and
          Default/Fluid pages as the standard-'A' style.
        feels_like: Textured, editorial, hand-composed collage on a calm clinical base.
        use_when: >-
          When a richer, collage-textured illustration register is wanted while keeping the
          crossroads style's calm clinical structure.
        avoid_when: >-
          When the clean, flat illustration register of the standard-'A' style is the goal.
        triad_rationale: >-
          Tejal theme + Digital Collage art style (free-text imageOptions.style) + GPT
          Image 2 Mini + Default/Fluid pages. NOTE: routing named styles via free-text
          `style` is the §6-canonical channel but UNPROVEN on the wire; the live render is
          the resolution test.
      example_url: "https://foundations-of-the-innov-63rmh43.gamma.site/"
      # Leg-D curated thumbnail: the session-09 BRIEFED re-render vignette card (a clean
      # Western-neutral crossroads digital collage; evidence
      # digital-collage-briefed-20260703T062743Z/A_A_pages/3_The-Modern-Clinicians-Dilemma.png).
      thumbnail_ref: state/config/gamma-styleguide-thumbnails/hil-2026-apc-crossroads-digital-collage.png
      last_used: null
    coherence:
      theme_art_keywords_dimensions: >-
        Tejal theme + "Digital Collage" art style (canonical free-text imageOptions.style) +
        GPT Image 2 Mini + Default/Fluid pages. PROVEN coherent on a live briefed re-render
        the operator signed off (session-09, 2026-07-03).
    provenance:
      source: crossroads-classic-artstyle-swap
      established: '2026-07-03'
      notes: >-
        Operator-directed art-style variant of hil-2026-apc-crossroads-classic: identical
        record with the art style changed illustration -> "Digital Collage", routed via the
        free-text imageOptions.style channel (custom_style) per matrix §6. PROMOTED to
        permanent (fully approved) 2026-07-03 session-09 after a briefed live re-render the
        operator approved ("beautiful"). Original reference deck (target look):
        https://a-clinician-at-the-cross-krkt5b4.gamma.site/ ; approved exemplar:
        https://foundations-of-the-innov-63rmh43.gamma.site/ .
        WINNING COMBO (for reliably reproducing this look): the style-field values in THIS
        record — image_source=aiGenerated; image_model=gpt-image-2-mini; style_preset=custom
        + custom_style="Digital Collage" (lands on the wire as imageOptions.style="Digital
        Collage", the canonical free-text channel — matrix §6); keywords=[] (imagery is driven
        by the per-slide brief, NOT keywords); text mode=condense/amount=minimal;
        dimensions=fluid; theme Tejal njim9kuhfnljvaa — PLUS the NON-NEGOTIABLE briefing
        requirement (matrix §8): every IMAGE-WARRANTED slide (title hero, human vignette) must
        carry a per-slide "Illustration: ..." brief in the slide CONTENT that names the collage
        composition (torn-paper / mixed-media fragments, layered clinical scenes, one clear
        subject), fixes a contemporary WESTERN / North-American clinical setting with NO
        cultural, national, or religious iconography, and forbids embedded/garbled text (any
        unavoidable text = brief, legible American English). Structure-warranted slides (data
        -> stat tiles, framework -> icon grid) stay content-only and render clean without a
        brief. WITHOUT the brief the model photo-grids and garbles signage (content-brief gap,
        matrix §8 — an authoring gap, NOT a style/model defect). Evidence: briefed
        digital-collage-briefed-20260703T062743Z (clean, on-brand, operator-approved) vs
        un-briefed digital-collage-trial-20260703T062339Z (photo-grid + garbled card-1).

