        feels_like: Deliberate, paced, follow-along-friendly.
        use_when: Narrated lessons whose style identity is a many-beat walk.
        avoid_when: Synthesis/big-picture decks whose value is the simultaneous whole.
        triad_rationale: >-
          Same Tejal theme + vector-minimalist visuals + Default/Fluid pages as the
          classic seed; the differentiator is the declared multi-beat cadence carried
          by the scripted floor, not any API-surface change.
