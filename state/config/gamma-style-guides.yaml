      additional_instructions:
      - Preserve the template's full-bleed image-card composition.
    presentation:
      display_name: HIL 2026 APC Studio Image Card
      distinguishing: >-
        Full-bleed Studio template look where the image card itself carries the title
        and key data; the template is the sole style authority.
      narrative:
        summary: >-
          Studio create-from-template full-bleed image cards; the template owns the
          design and Gary only swaps the subject.
        feels_like: Bold, immersive, single-image-per-slide.
        use_when: A slide's meaning lives in one full-bleed illustration with embedded text.
        avoid_when: Multi-block Classic typography or dense text is required.
        triad_rationale: >-
          The Studio template is the style source of truth; no Classic text/card surface
          applies, and the aspect-ratio guard (min 1.4) proves the exported card kept the
          template's 16:9 frame rather than falling back to Classic.
