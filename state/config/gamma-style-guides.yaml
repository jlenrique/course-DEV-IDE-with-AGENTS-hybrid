        The calm clinical default: freeform source prose condensed to spacious
        illustrated cards where the screen carries gist and the voiceover carries detail.
      narrative:
        summary: >-
          Clean clinical-education style that turns freeform prose into spacious
          white-background cards with navy headings, teal body, and soft vector panels.
        feels_like: Professional, calm, approachable, APC/clinical-leadership oriented.
        use_when: Narrated lessons where the screen shows gist and VO holds the detail.
        avoid_when: Data-heavy or editorial decks needing dense per-card structure.
        triad_rationale: >-
          The Tejal theme, AI-generated illustration/vector-minimalist keywords, and the
          Default/Fluid page setup agree on one calm clinical register; Fluid is the
          exemplar's true page shape (any Descript-bound 16:9 is a publication-time policy,
