schema_version: "1.0"
description: >
  Human-readable companion schema for Creative Director directives.
  JSON schema is canonical for machine validation.

required_top_level_fields:
  - schema_version
  - experience_profile
  - slide_mode_proportions
  - narration_profile_controls
  - creative_rationale

experience_profile:
  allowed_values:
    - visual-led
    - text-led

slide_mode_proportions:
  required_keys:
    - literal-text
    - literal-visual
    - creative
  numeric_bounds:
    min: 0.0
    max: 1.0
  sum_rule:
    target: 1.0
    tolerance: 0.001

narration_profile_controls:
  required_keys:
    - narrator_source_authority
    - slide_content_density
    - elaboration_budget
    - connective_weight
    - callback_frequency
    - visual_narration_coupling
    - rhetorical_richness
    - vocabulary_register
    - arc_awareness
    - narrative_tension
    - emotional_coloring
  allowed_values:
    narrator_source_authority:
      - source-grounded
      - balanced
      - slide-led
    slide_content_density:
      - lean
      - adaptive
      - dense
    elaboration_budget:
      - low
      - medium
      - high
    connective_weight:
      - light
      - balanced
      - heavy
    callback_frequency:
      - sparse
      - moderate
      - frequent
    visual_narration_coupling:
      - loose
      - balanced
      - tight
    rhetorical_richness:
      - restrained
      - balanced
      - expressive
    vocabulary_register:
      - accessible
      - professional
      - specialist
    arc_awareness:
      - low
      - medium
      - high
    narrative_tension:
      - low
      - medium
      - high
    emotional_coloring:
      - neutral
      - warm
      - vivid

gamma_settings:
  optional: true
  nullable: true
  description: >
    Optional per-variant Gamma settings. Omit the field for legacy
    single-dispatch behavior. The operator may override these per run.
  entry_required_keys:
    - variant_id
  variant_id:
    allowed_values:
      - A
      - B
  theme:
    type: open-string
    known_values:
      - default
  template:
    type: open-string
    known_values:
      - default
  image_style:
    type: open-string
    known_values:
      - photographic
      - diagrammatic
      - illustrative
  density:
    allowed_values:
      - lean
      - balanced
      - dense
  tone:
    allowed_values:
      - professional
      - warm
      - technical
