schema_version: "1.0"
description: >
  Human-readable companion schema for Creative Director directives.
  JSON schema is canonical for machine validation.

required_top_level_fields:
  - schema_version
  - experience_profile
  - slide_mode_proportions
  - narration_profile_controls
  - creative_rationale

experience_profile:
  allowed_values:
    - visual-led
    - text-led

slide_mode_proportions:
  required_keys:
    - literal-text
    - literal-visual
    - creative
  numeric_bounds:
    min: 0.0
    max: 1.0
  sum_rule:
    target: 1.0
    tolerance: 0.001

narration_profile_controls:
  required_keys:
    - narrator_source_authority
    - slide_content_density
    - elaboration_budget
    - connective_weight
    - callback_frequency
    - visual_narration_coupling
    - rhetorical_richness
    - vocabulary_register
    - arc_awareness
    - narrative_tension
    - emotional_coloring
  allowed_values:
    narrator_source_authority:
      - source-grounded
      - balanced
      - slide-led
    slide_content_density:
      - lean
      - adaptive
      - dense
    elaboration_budget:
      - low
      - medium
      - high
    connective_weight:
      - light
      - balanced
      - heavy
    callback_frequency:
      - sparse
      - moderate
      - frequent
    visual_narration_coupling:
      - loose
      - balanced
      - tight
    rhetorical_richness:
      - restrained
      - balanced
      - expressive
    vocabulary_register:
      - accessible
      - professional
      - specialist
    arc_awareness:
      - low
      - medium
      - high
    narrative_tension:
      - low
      - medium
      - high
    emotional_coloring:
      - neutral
      - warm
      - vivid

gamma_settings:
  optional: true
  nullable: true
  description: >
    Optional per-variant Gamma settings. Omit the field for legacy
    single-dispatch behavior. The operator may override these per run.
  entry_required_keys:
    - variant_id
  variant_id:
    allowed_values:
      - A
      - B
  styleguide:
    type: open-string
    description: >
      Optional name of a CD-owned record in
      state/config/gamma-style-guides.yaml. When present, its resolved
      base-layer API keys seed this variant before any explicit per-variant
      override.
  theme:
    type: open-string
    known_values:
      - default
  template:
    type: open-string
    known_values:
      - default
  image_style:
    type: open-string
    known_values:
      - photographic
      - diagrammatic
      - illustrative
  amount:
    allowed_values:
      - brief
      - medium
      - detailed
      - extensive
  density:
    allowed_values:
      - lean
      - balanced
      - dense
  tone:
    type: open-string
  audience:
    type: open-string
  language:
    allowed_values:
      - en
  text_mode:
    allowed_values:
      - generate
      - condense
      - preserve
  image_style_preset:
    allowed_values:
      - photorealistic
      - illustration
      - abstract
      - 3D
      - lineArt
      - custom
  image_model:
    # Doc-parity: https://developers.gamma.app/reference/image-model-accepted-values.md
    # Last reconciled: 2026-07-02. Refresh via scripts/utilities/audit_gamma_docs.py;
    # lockstep with _act.py::IMAGE_MODEL_VALUES + .schema.json (D-2 parity pin).
    allowed_values:
      - flux-1-quick
      - flux-2-klein
      - flux-kontext-fast
      - imagen-3-flash
      - gpt-image-1-mini-low
      - luma-photon-flash-1
      - gpt-image-2-mini
      - flux-1-pro
      - imagen-3-pro
      - flux-2-pro
      - gpt-image-1-mini-medium
      - ideogram-v3-turbo
      - luma-photon-1
      - recraft-v4
      - leonardo-phoenix
      - flux-2-flex
      - flux-2-max
      - flux-kontext-pro
      - ideogram-v3
      - imagen-4-pro
      - recraft-v3
      - gemini-2.5-flash-image
      - gpt-image-1-mini-high
      - gpt-image-1-medium
      - gpt-image-2
      - flux-1-ultra
      - imagen-4-ultra
      - dall-e-3
      - gemini-3.1-flash-image-mini
      - flux-kontext-max
      - recraft-v3-svg
      - recraft-v4-svg
      - ideogram-v3-quality
      - gemini-3.1-flash-image
      - gemini-3-pro-image
      - gemini-3.1-flash-image-hd
      - gpt-image-2-hd
      - gpt-image-1-high
      - gemini-3-pro-image-hd
      - recraft-v4-pro
  image_source:
    allowed_values:
      - aiGenerated
      - pexels
      - webFreeToUse
      - webFreeToUseCommercially
      - themeAccent
      - placeholder
      - noImages
      - pictographic
      - giphy
      - webAllImages
  dimensions:
    allowed_values:
      - fluid
      - 16x9
      - 4x3
      - pageless
      - letter
      - a4
      - 1x1
      - 4x5
      - 9x16
  keywords:
    type: string-array
