# Slab 1 Story 1.6 migrated v4.2 manifest — primary repo's 33-step
# narrated-lesson-with-video-or-animation pack reshaped to the migration's
# `PipelineManifest` schema (from Story 1.4).
#
# Preserves the v4.2 step ids (01, 02, 02A, 03, 04, 04A, 04.5, 04.55, 4.75,
# 05, 05B, 06, 6.2, 6.3, 06B, 07, 7.5, 07B, 07C, 07D, 07E, 07F, 08, 08B, 09,
# 10, 11, 11B, 12, 13, 14, 14.5, 15) byte-equivalent; synthesizes edges from
# per-step `insertion_after` (linear chain; conditionals + dispatch envelopes
# are Slab 2/3 territory per AC-1.6-A). Each node's `specialist_id` names the
# canonical APP specialist the step routes to; Slab 1 resolves every
# `specialist_id` to `app.specialists._stub.passthrough_specialist.passthrough_node`
# so §01→§15 end-to-end smoke runs without real specialists.
#
# Provenance: field shapes match `git show upstream/master:state/config/pipeline-manifest.yaml`
# (33 steps at 2026-04-22 upstream HEAD). Per Winston/Amelia 2026-04-22
# amendment, the v4.2 schema-delta inventory was completed at Story 1.4
# authoring, so `PipelineManifest` already accommodates every v4.2 field —
# this file requires NO schema extension on 1.6.
#
# `app/smoke_test.py` continues to exercise the single-node `noop` substrate
# smoke path when invoked without `--full`; the `--full` flag (landed in 1.6)
# runs this full manifest end-to-end.

schema_version: "v4.2-migration-stub-with-fold-flags"
pack_version: "v4.2"
generator_ref: "scripts/generators/v42/render.py"
