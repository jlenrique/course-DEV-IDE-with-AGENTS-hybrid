entrypoint: "01"
frozen_graph_version: "v42"
# Versioned home for the data-plane vocabulary (dependencies +
# dependency_projections) — Winston S1-B, party review 2026-06-12.
# Tier-2 governance for vocabulary changes attaches HERE (party-mode
# consensus per bump); pack_version provably does not govern the data
# plane (regime doc, determination 2026-06-12, commit 2a617f5).
# dp-v1.1 (party consensus 2026-06-12, Trial-3 cycle-4 08/08B remediation):
# additive projections onto nodes 08 + 08B — same dp-v1 mechanics, new
# vocabulary rows. dp-v2 remains reserved for the refinement self-edge
# vocabulary (deferred-inventory rider).
# dp-v1.2 (party consensus 2026-06-12, audio-segment arc): additive
# projections onto nodes 12/13/14 (audio synthesis + G5 QA + compositor);
# node 11's dead quarantined upstream_output←kira edge retired.
# dp-v1.3 (P2-2, 2026-06-20): additive vision→G5 projection. Scenario A
# does not fire — PerceptionArtifact is an internal envelope contribution
# consumed by the detector, NOT a learner-facing pack-lineage content
# deliverable; therefore this content node is a topology refinement within
# the v4.2 lineage, not a new pack family. pack_version stays v4.2; the
# v4.2-gen determinism witness regenerates.
# dp-v1.4 (P2-3, 2026-06-21): additive vision→Irene Pass-2 projection.
# Irene grounds visual narration in perceived PNG evidence; Gary/brief
# expectations remain demoted expected-plan context.
# dp-v1.5 (P2-4a, 2026-06-21): additive reading_path vocabulary on rich
# PerceptionArtifact plus native registry/schema/lint/classifier lockstep.
# Classifier is vision-adjacent; pack_version remains v4.2.
# dp-v1.6 (P2-4c S1, 2026-06-23): additive reading-path tuple sibling
# fields and widened derived-primary names; deterministic geometry only.
# Perceiver contract unchanged; pack_version remains v4.2.
data_plane_vocabulary_version: "dp-v1.6"
