# Slab 1 Story 1.1c migration substrate stub.
#
# This file is the LangChain/LangGraph migration's pipeline manifest, NOT the
# legacy primary-repo v4.2 prompt-pack manifest. The hybrid clone fork
# (`dev/langchain-langgraph-foundation`) deliberately overwrites the primary
# v4.2 file on this branch per FR60 forward-port freeze (active since
# Story 1.1a closed) and per the Story 1.6 plan — Story 1.6 will rewrite this
# file again to the migration's v4.2-equivalent shape conforming to the
# `PipelineManifest` schema introduced in Story 1.4.
#
# To recover the primary repo's v4.2 manifest on this branch, fetch from
# upstream: `git show upstream/master:state/config/pipeline-manifest.yaml`.
#
# Story 1.1c contract (this stub): one no-op step that loads via
# `app.smoke_test` and exercises `app.runtime.minimal_node` to produce the
# `{"smoke": "ok", "node": "noop"}` payload. Story 1.4 introduces the real
# loader + compiler; until then `app.smoke_test` uses a minimal yaml.safe_load
# + Pydantic-validate path.
schema_version: "0.1-stub"
graph:
  nodes:
    - id: noop
      handler: app.runtime.minimal_node:minimal_node
  edges:
    - from: __start__
      to: noop
    - from: noop
      to: __end__
