name: manifest-lockstep

on:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -e .
      - name: Run lockstep check
        run: python -c "import sys; from scripts.utilities.check_manifest_lockstep import main; sys.exit(main())"
