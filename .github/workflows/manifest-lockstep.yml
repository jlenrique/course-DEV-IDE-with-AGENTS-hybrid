name: manifest-lockstep

# Solo operator (2026-07-09): auto PR triggers muted - manual only.
# See AGENTS.md section Solo operator - no formal PR framework.
on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -e .
      - name: Run lockstep check
        run: python -c "import sys; from scripts.utilities.check_manifest_lockstep import main; sys.exit(main())"
