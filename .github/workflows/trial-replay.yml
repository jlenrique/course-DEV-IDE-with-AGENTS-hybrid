name: trial-replay

# Solo operator (2026-07-09): daily schedule muted (failure emails).
# See AGENTS.md section Solo operator - no formal PR framework.
on:
  workflow_dispatch:

jobs:
  replay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -e .
      - name: Replay all closed trials
        run: python -m app.replay.regression --mode fail-loud
