name: trial-replay

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *"

jobs:
  replay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -e .
      - name: Replay all closed trials
        run: python -m app.replay.regression --mode fail-loud
