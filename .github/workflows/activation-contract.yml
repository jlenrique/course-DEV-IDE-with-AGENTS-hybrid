name: activation-contract

# Solo operator (2026-07-09): auto PR/push triggers muted - manual only.
# See AGENTS.md section Solo operator - no formal PR framework.
on:
  workflow_dispatch:

jobs:
  activation-contract:
    name: SG-1 11-specialist roster + per-specialist activation contracts
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Sync dependencies
        run: python -m pip install -e ".[dev]"  # uv sync disabled by [tool.uv] managed=false

      - name: SG-1 roster floor (FR88 + FR105; 11 specialists)
        run: uv run pytest tests/parity/test_eleven_specialists_addressable.py --tb=short -q

      - name: Per-specialist activation contracts (11 files)
        run: uv run pytest tests/parity/test_*_activation_contract.py --tb=short -q
