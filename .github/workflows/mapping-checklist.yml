name: mapping-checklist

# Solo operator (2026-07-09): auto PR/push triggers muted - manual only.
# See AGENTS.md section Solo operator - no formal PR framework.
on:
  workflow_dispatch:

jobs:
  mapping-checklist:
    name: SG-2 mapping-checklist row-status invariant (NFR-I11)
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Sync dependencies
        run: python -m pip install -e ".[dev]"  # uv sync disabled by [tool.uv] managed=false

      - name: Mapping-checklist row-status invariant
        run: uv run pytest tests/parity/test_mapping_checklist_status.py --tb=short -q
