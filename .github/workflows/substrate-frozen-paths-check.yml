name: substrate-frozen-paths-check

on:
  pull_request:
    paths:
      - "app/marcus/orchestrator/dispatch_adapter.py"
      - ".github/workflows/substrate-frozen-paths-check.yml"
  push:
    branches:
      - master
      - "dev/**"
  workflow_dispatch:

jobs:
  substrate-frozen-paths-check:
    name: FR113 substrate-frozen-paths invariant (NFR-I13)
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine merge base
        id: merge-base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "base=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
            echo "head=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "base=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
            echo "head=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect substrate-frozen path diff
        id: detect-diff
        run: |
          base="${{ steps.merge-base.outputs.base }}"
          head="${{ steps.merge-base.outputs.head }}"
          if [ -z "$base" ] || [ -z "$head" ]; then
            echo "Skipping check; no base/head SHAs available"
            echo "diff_present=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Detect any diff hunk touching dispatch_adapter.py lines 70-95
          diff_output=$(git diff -U0 "$base" "$head" -- app/marcus/orchestrator/dispatch_adapter.py 2>/dev/null || true)
          if [ -z "$diff_output" ]; then
            echo "diff_present=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Check if any hunk header references the frozen line range (70-95)
          frozen_touched=$(echo "$diff_output" | awk '
            /^@@/ {
              # parse @@ -<start>,<count> +<start>,<count> @@
              match($0, /\+([0-9]+),?([0-9]*)/, arr)
              start = arr[1]
              count = arr[2] == "" ? 1 : arr[2]
              end = start + count - 1
              if ((start <= 95 && end >= 70)) {
                print "TOUCHED"
                exit
              }
            }
          ')
          if [ -n "$frozen_touched" ]; then
            echo "diff_present=true" >> "$GITHUB_OUTPUT"
          else
            echo "diff_present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify ceremony commit pattern if frozen lines touched
        if: steps.detect-diff.outputs.diff_present == 'true'
        run: |
          base="${{ steps.merge-base.outputs.base }}"
          head="${{ steps.merge-base.outputs.head }}"
          # Walk every commit in range and require at least one carries [substrate-ceremony] token
          commit_messages=$(git log --pretty=format:"%H%n%B%n---END---" "$base..$head")
          if echo "$commit_messages" | grep -qE "\[substrate-ceremony\]"; then
            echo "Ceremony commit detected; substrate-frozen-paths edit authorized."
          else
            echo "::error::dispatch_adapter.py:70-95 is FR113-frozen substrate." >&2
            echo "::error::Diff touches frozen range without [substrate-ceremony] commit token." >&2
            echo "::error::Either revert the frozen-range hunk OR add a ceremony commit:" >&2
            echo "::error::  - commit message MUST contain '[substrate-ceremony]'" >&2
            echo "::error::  - commit body MUST link to party-mode consensus record" >&2
            echo "::error::See FR113 + NFR-I13 in the Slab 7b PRD." >&2
            exit 1
          fi
