# Irene Pass 2 model cascade — Story 2a.2.
#
# Cascade levels (D2 + Story 1.3):
#   Level 1: per-call override (set via RunState.model_overrides at runtime)
#   Level 2: per-specialist default (this file)
#   Level 3: registry default (app/models/registry.yaml)
#
# Tier mapping (anti-pattern A10 — epic-doc model-ID drift):
#   Epic 2a.2 text says tier "long-context balanced" → `gpt-4.1`. NEITHER value
#   exists in the shipped registry. The framework wins per DR-1 spec-yields-to-code:
#   Irene's narration-Pass-2 workload maps to `tier_request: reasoning`, which
#   resolves to `gpt-5` via app/models/selection_policy.yaml.
#
# Temperature variance (NFR-X5):
#   `temperature_default: 0.3` — narration creativity tolerance. Pass 2 produces
#   pedagogically grounded narration that benefits from mild stochastic variation
#   (slide-purpose-driven phrasing, bridge-cadence variance). Bounded well below
#   the 0.7+ "creative" range to keep verb/payload determinism intact.
#
#   AC-D cache-hit-rate test overrides locally to `temperature: 0.0` for the
#   10-invocation in-process measurement window — guarantees deterministic cache
#   key during the FR54 baseline. Override happens at RunState construction, not
#   here, so the shipped config reflects production-faithful settings.
specialist_id: "irene"
default_model: "gpt-5"
per_node_overrides:
  act: "gpt-5"
temperature_default: 0.3
