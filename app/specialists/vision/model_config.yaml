# Level 1: per-call override (set via RunState.model_overrides at runtime)
# Level 2: per-specialist default (this field)
# Level 3: registry default (app/models/registry.py)
#
# vision-perceiver-real (2026-06-21): the vision specialist is now a LIVE
# gpt-5.5 multimodal perceiver. The prior fixture `provider:` block
# (endpoint_env / api_key_env / model_id: vision-fixture-v1) is retired; the
# real model id resolves through default_model + per_node_overrides.act, which
# perceive_png passes to make_chat_model as the per-call override.
specialist_id: "vision"
default_model: "gpt-5.5"
per_node_overrides:
  act: "gpt-5.5"
temperature_default: 0.0
