# Slab 1 Story 1.3 model catalog. Per architecture §D13:
# - Adding entries here is Tier-1 (dev-agent authority).
# - Removing or version-pinning is Tier-2 (party-mode round required).
# - Provider family change is Tier-3 (party-mode + version bump in registry.py).
