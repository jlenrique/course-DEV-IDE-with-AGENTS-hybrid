course_learning_objectives:
- objective_id: lo-001
  text: Differentiate the core paradigms of AI, machine learning, and deep learning,
    and explain how generative models differ from discriminative models.
  source_ref:
    path: course-content/courses/aziz-nazha-hai-510-generative-ai-in-healthcare/sources/course/Syllabus_Generative_AI_in_Healthcare.docx
    locator: paragraph 19
- objective_id: lo-002
  text: Describe how large language models work, including transformer architecture,
    self-attention, positional encoding, tokenization, embeddings, and the role of
    RLHF and fine-tuning.
  source_ref:
    path: course-content/courses/aziz-nazha-hai-510-generative-ai-in-healthcare/sources/course/Syllabus_Generative_AI_in_Healthcare.docx
    locator: paragraph 20
- objective_id: lo-003
  text: Apply structured prompt-engineering techniques to elicit accurate, reliable
    outputs from generative AI tools in healthcare and education contexts.
  source_ref:
    path: course-content/courses/aziz-nazha-hai-510-generative-ai-in-healthcare/sources/course/Syllabus_Generative_AI_in_Healthcare.docx
    locator: paragraph 21
- objective_id: lo-004
  text: Evaluate generative AI applications across clinical practice, biology, and
    drug discovery, and judge their real-world feasibility and limitations.
  source_ref:
    path: course-content/courses/aziz-nazha-hai-510-generative-ai-in-healthcare/sources/course/Syllabus_Generative_AI_in_Healthcare.docx
    locator: paragraph 22
- objective_id: lo-005
  text: Identify and mitigate ethical and safety risks—hallucination, bias and fairness,
    data privacy, HIPAA and FDA considerations, and adversarial attacks such as jailbreaking
    and data poisoning.
  source_ref:
    path: course-content/courses/aziz-nazha-hai-510-generative-ai-in-healthcare/sources/course/Syllabus_Generative_AI_in_Healthcare.docx
    locator: paragraph 23
- objective_id: lo-006
  text: Design and prototype an agentic, multi-step AI system for a clinical, research,
    or educational workflow.
  source_ref:
    path: course-content/courses/aziz-nazha-hai-510-generative-ai-in-healthcare/sources/course/Syllabus_Generative_AI_in_Healthcare.docx
    locator: paragraph 24
