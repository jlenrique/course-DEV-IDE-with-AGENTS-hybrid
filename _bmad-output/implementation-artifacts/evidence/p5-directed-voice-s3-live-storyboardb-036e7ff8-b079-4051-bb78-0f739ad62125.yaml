- segment_id: seg-01
  id: seg-01
  slide_id: slide-01
  narration_text: To orient us, look to the left panel’s upward line—national health
    expenditures climbing to $5.2 trillion and approaching one‑fifth of the economy.
    That growth concentrates scrutiny and shifts decisions to the enterprise level.
    On the right, the side‑by‑side bars—independent practice contracting while hospital
    employment expands—show where decision rights are migrating. As more of us work
    inside large systems, influence depends less on personal autonomy and more on
    knowing how to navigate and shape the enterprise. That is the operating context
    for any change you hope to make.
  timing_role: concept-build
  content_density: medium
  visual_detail_load: heavy
  duration_rationale: Two visuals (line + bars) require guided interpretation without
    numeration repeat.
