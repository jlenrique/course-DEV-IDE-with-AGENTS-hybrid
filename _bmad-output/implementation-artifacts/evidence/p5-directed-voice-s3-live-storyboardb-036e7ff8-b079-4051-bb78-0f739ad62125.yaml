- segment_id: seg-04
  id: seg-04
  slide_id: slide-04
  narration_text: 'From tools to expectations, trace the journey from the smartphone
    at left to the provider end points at right. A true digital front door makes that
    path seamless—beyond a basic portal—to triage, scheduling, and guidance that feel
    intuitive. Jefferson Health’s example shows the direction: AI‑driven triage helping
    patients navigate to the right care setting without friction. In a consumer environment,
    intentional design is the difference between a frustrating experience and a world‑class
    one.'
  timing_role: concept-build
  content_density: medium
  visual_detail_load: medium
