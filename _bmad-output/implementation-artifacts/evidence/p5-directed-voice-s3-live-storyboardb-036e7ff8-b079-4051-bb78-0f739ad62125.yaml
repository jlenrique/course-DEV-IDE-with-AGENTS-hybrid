- segment_id: seg-05
  id: seg-05
  slide_id: slide-05
  narration_text: 'Turning to capability, the bar chart lays out the gap: the taller
    bar—67% of physicians interested in leadership—towers over the shorter bar—only
    18% with executive or business training. The pandemic underscored that management
    and systems thinking aren’t ‘soft’ extras; they’re critical to outcomes and well‑being.
    Academic Health Centers often have the clinical expertise but lack the cultural
    incentives and interdisciplinary integration to scale good ideas. Clinicians who
    can bridge practice with technology and organizational strategy are now essential.'
  timing_role: concept-build
  content_density: medium
  visual_detail_load: medium
  duration_rationale: Simple two-bar comparison; narration emphasizes implications
    and the bridging role.
