- segment_id: seg-03
  id: seg-03
  slide_id: slide-03
  narration_text: 'Building on that, focus on the central timeline: where medical
    knowledge once doubled over decades, it’s now projected to double in about 73
    days—static training can’t keep pace. To the right, the AI adoption callout—around
    66% of physicians—highlights both opportunity and oversight risk, as formal training
    on safe supervision lags practice. The upside is real: digital programs like SMART
    remote monitoring have reduced ER visits for COPD and heart failure by shifting
    care from reactive to proactive, and virtual reality lets teams rehearse complex
    procedures without patient risk. Technology will reshape care—but it needs clinical
    leadership to guide safe, effective use.'
  timing_role: concept-build
  content_density: medium
  visual_detail_load: medium
  duration_rationale: Timeline + AI callout invite insight on velocity and oversight
    with two concrete examples.
