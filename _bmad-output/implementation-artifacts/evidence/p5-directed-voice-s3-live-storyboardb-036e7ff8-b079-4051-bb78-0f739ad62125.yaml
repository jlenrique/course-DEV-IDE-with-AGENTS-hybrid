- segment_id: seg-02
  id: seg-02
  slide_id: slide-02
  narration_text: 'Now shift from structure to people: the left statistic—about a
    quarter of total spend lost to administration and waste—signals the scale of inefficiency.
    The right figure—over half of physicians reporting burnout—locates the harm. Crucially,
    the top driver isn’t patient volume; it’s bureaucratic tasks and administrative
    bloat. Read through that lens, burnout is a system design problem, not a resilience
    deficit—and the daily EHR workarounds and admission bottlenecks become prime targets
    for innovation.'
  timing_role: concept-build
  content_density: medium
  visual_detail_load: medium
  duration_rationale: Two headline stats warrant concise interpretation and reframing
    burnout as a design problem.
