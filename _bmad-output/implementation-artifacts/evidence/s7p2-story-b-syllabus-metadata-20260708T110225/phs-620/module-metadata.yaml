learner_profile:
  value: Explores adult education principles and course design for a variety of learning
    environments. Evaluates strategies to boost learner satisfaction and retention,
    including 'backward design.' Emphasizes key design techniques and online tools.
    Identifies methods for assessing learning outcomes. Introduces the Quality Matters
    Rubric 5 Pillars of Quality and support resources for robust course creation and
    teaching effectiveness. Culminates in a Population Health lesson plan and group
    work on a collaborative, ongoing class project in educational technology for Population
    Health.
  source_ref:
    path: course-content/courses/juan-leon-phs-620-teaching-learning-seminar/sources/course/PHS
      620 Syllabus 2025.doc
    locator: table 1 row 1
course_learning_objectives:
- objective_id: plo-01
  text: Develop an evidence-based lesson plan as part of an educational program for
    adult learners.
  source_ref:
    path: course-content/courses/juan-leon-phs-620-teaching-learning-seminar/sources/course/PHS
      620 Syllabus 2025.doc
    locator: table 3 row 1
- objective_id: plo-02
  text: Identify and address the needs of critical third-party stakeholders--such
    as accreditors, administrators, and other reviewers or clients--along with the
    needs of learners.
  source_ref:
    path: course-content/courses/juan-leon-phs-620-teaching-learning-seminar/sources/course/PHS
      620 Syllabus 2025.doc
    locator: table 3 row 2
- objective_id: plo-03
  text: Apply the 'Backward' design approach to lesson and course development for
    both online and classroom-based environments.
  source_ref:
    path: course-content/courses/juan-leon-phs-620-teaching-learning-seminar/sources/course/PHS
      620 Syllabus 2025.doc
    locator: table 3 row 3
- objective_id: plo-04
  text: Design and deliver an engaging presentation promoting learner satisfaction,
    retention of knowledge, and application.
  source_ref:
    path: course-content/courses/juan-leon-phs-620-teaching-learning-seminar/sources/course/PHS
      620 Syllabus 2025.doc
    locator: table 3 row 4
- objective_id: plo-05
  text: Efficiently assess and evaluate the learner's experience and achievement.
  source_ref:
    path: course-content/courses/juan-leon-phs-620-teaching-learning-seminar/sources/course/PHS
      620 Syllabus 2025.doc
    locator: table 3 row 5
- objective_id: plo-06
  text: Formulate timely, well-considered feedback and coaching to learners.
  source_ref:
    path: course-content/courses/juan-leon-phs-620-teaching-learning-seminar/sources/course/PHS
      620 Syllabus 2025.doc
    locator: table 3 row 6
- objective_id: plo-07
  text: Design a project in educational technology addressing a recognized need in
    Population Health.
  source_ref:
    path: course-content/courses/juan-leon-phs-620-teaching-learning-seminar/sources/course/PHS
      620 Syllabus 2025.doc
    locator: table 3 row 7
