schema_version: 0.1-draft
status: draft
registry_owner: cd
runtime_target_path: state/config/gamma-style-guides.yaml
source_design:
  briefing: _bmad-output/planning-artifacts/gamma-styleguide-library-briefing-2026-06-30.md
  seed_sources:
  - state/config/gamma-style-presets.yaml
  - app/specialists/gary/_act.py::DEFAULT_VARIANT_PAIR
  - runs/studio-trial/studio-b-gamma-settings.yaml
validation_policy:
  required_roster:
    min_style_guides: 4
    min_classic_api_guides: 1
    min_studio_guides: 1
  completeness:
    null_or_default_fails_required_fields: true
    required_fields_are_surface_relative: true
  api_surface:
    allowed_generation_methods:
    - classic_generation
    - template_generation
    api_requires:
    - theme
    - prompt_configuration
    - page_settings
    studio_requires:
    - studio_template
    - studio_prompt_lock
    - export
    studio_forbids_classic_only_fields:
    - prompt_configuration.text_content
    - prompt_configuration.generation.num_cards
    - page_settings.card_options
  provenance:
    require_brand_binding: true
    require_styleguide_version: true
    require_origin_notes: true
  live_proof:
    require_theme_or_template_existence_check: true
    require_differential_no_vacuous_green: true
    require_operator_eye_look_verdict: true
implementation_status_keywords:
  in_use: Currently wired and active in the local production path.
  available: Documented or locally passable programmatic control exists, but this specific registry field/value is not necessarily active.
  format_limited: Programmatic control exists only for compatible Gamma formats, not necessarily for presentation decks.
  template: Control should be supplied by Gamma theme/template design unless future API proof says otherwise.
  TBD: No confirmed programmatic control path yet.
column_model:
  note: Flat row view for operator/CD review. Each column is classified by how it reaches Gamma, if at all.
  field_types:
    api_field: Passed directly to the Gamma API for the applicable generation method.
    api_documented_unwired: Documented by Gamma and passable in principle, but not exposed by the current Gary normalization/dispatch layer.
    compiled_field: Transformed by Gary/Marcus into one or more API fields.
    runtime_policy: Controls which Gamma API path or runtime behavior is used.
    metadata: Registry/provenance/design context; not sent to Gamma.
    theme_or_template_owned: Controlled by the selected Gamma theme/template or by template prompt design, not by a documented per-request API field.
    manual_or_ui_only: Recorded for human/UI parity but not enforceable through the current API client or current documented Gamma API.
  columns:
    style_guide_id:
      field_type: metadata
      gamma_mapping: null
    display_name:
      field_type: metadata
      gamma_mapping: null
    status:
      field_type: metadata
      gamma_mapping: null
    version:
      field_type: metadata
      gamma_mapping: null
    generation_method:
      field_type: runtime_policy
      gamma_mapping: classic_generation -> POST /generations; template_generation -> POST /generations/from-template
    intended_use:
      field_type: metadata
      gamma_mapping: null
    theme_id:
      field_type: api_field
      gamma_mapping: themeId
      applies_to:
      - classic_generation
      - template_generation
    theme_name:
      field_type: metadata
      gamma_mapping: null
    template_id:
      field_type: api_field
      gamma_mapping: gammaId
      applies_to:
      - template_generation
    template_name:
      field_type: metadata
      gamma_mapping: null
    live_example_url:
      field_type: metadata
      gamma_mapping: null
      note: Published Gamma URL or similar live exemplar for human review and CD/Gary calibration; not sent to Gamma.
    text_mode:
      field_type: api_field
      gamma_mapping: textMode
      applies_to:
      - classic_generation
    text_amount:
      field_type: api_field
      gamma_mapping: textOptions.amount
      applies_to:
      - classic_generation
      note: Primarily meaningful when textMode is generate or condense.
    audience:
      field_type: api_field
      gamma_mapping: textOptions.audience
      applies_to:
      - classic_generation
      note: Primarily meaningful when textMode is generate.
    tone:
      field_type: api_field
      gamma_mapping: textOptions.tone
      applies_to:
      - classic_generation
      note: Primarily meaningful when textMode is generate.
    language:
      field_type: api_field
      gamma_mapping: textOptions.language
      applies_to:
      - classic_generation
    image_source:
      field_type: api_field
      gamma_mapping: imageOptions.source
      applies_to:
      - classic_generation
      - template_generation
    image_model:
      field_type: api_field
      gamma_mapping: imageOptions.model
      applies_to:
      - classic_generation
      - template_generation
    image_style_preset:
      field_type: api_field
      gamma_mapping: imageOptions.stylePreset
      applies_to:
      - classic_generation
      note: Template generation currently exposes imageOptions but not the full Classic text/card surface.
    custom_style_prompt:
      field_type: api_field
      gamma_mapping: imageOptions.style
      applies_to:
      - classic_generation
      - template_generation
      note: Only respected when stylePreset is custom or unset.
    keywords:
      field_type: compiled_field
      gamma_mapping: additionalInstructions, or imageOptions.style when stylePreset=custom
    format_type:
      field_type: api_field
      gamma_mapping: format
      applies_to:
      - classic_generation
    format_variant:
      field_type: manual_or_ui_only
      gamma_mapping: null
      note: Gamma UI concept; not a current generate kwarg in scripts/api_clients/gamma_client.py.
    card_split:
      field_type: api_field
      gamma_mapping: cardSplit
      applies_to:
      - classic_generation
    num_cards_policy:
      field_type: runtime_policy
      gamma_mapping: numCards
      note: Runtime usually derives numCards from len(slides), not from a fixed styleguide value.
    additional_instructions:
      field_type: api_field
      gamma_mapping: additionalInstructions
      applies_to:
      - classic_generation
      note: For template_generation, instructions are normally part of the template prompt/lock wrapper, not this Classic field.
    page_shape:
      field_type: compiled_field
      gamma_mapping: cardOptions.dimensions
      applies_to:
      - classic_generation
      note: Operator-facing Page setup preset. default_fluid -> fluid; traditional_16x9 -> 16x9; tall_4x3 -> 4x3; custom -> custom_aspect_ratio.
    custom_full_bleed:
      field_type: manual_or_ui_only
      gamma_mapping: null
      note: Visible under Custom per operator report; no current local Gamma API/Gary mapping.
    aspect_ratio:
      field_type: api_field
      gamma_mapping: cardOptions.dimensions
      applies_to:
      - classic_generation
      note: Normalized API value. Local Gary currently allows fluid, 16x9, 4x3, pageless, letter, a4, 1x1, 4x5, and 9x16.
    card_width:
      field_type: manual_or_ui_only
      gamma_mapping: null
      note: Gamma UI Page setup value M/L; no current local Gamma API/Gary mapping.
    content_alignment:
      field_type: manual_or_ui_only
      gamma_mapping: null
      note: Gamma UI Page setup value top/middle/bottom; no current local Gamma API/Gary mapping.
    font_size:
      field_type: manual_or_ui_only
      gamma_mapping: null
      note: Gamma UI Page setup value S/M/L; no current local Gamma API/Gary mapping.
    show_card_backdrops:
      field_type: manual_or_ui_only
      gamma_mapping: null
      note: Gamma UI toggle; no current local Gamma API/Gary mapping.
    animations:
      field_type: manual_or_ui_only
      gamma_mapping: null
      note: Gamma UI toggle; no current local Gamma API/Gary mapping.
    dimensions:
      field_type: api_field
      gamma_mapping: cardOptions.dimensions
      applies_to:
      - classic_generation
      note: Style-exemplar value should reflect the selected Gamma style/page setup. Publication safety overrides such as Descript-bound 16x9 belong in runtime policy, not in the exemplar.
    header_footer:
      field_type: compiled_field
      gamma_mapping: cardOptions.headerFooter
      applies_to:
      - classic_generation
      note: Current draft boolean is not the final API shape; Gamma expects a structured header/footer object.
    export_as:
      field_type: api_field
      gamma_mapping: exportAs
      applies_to:
      - classic_generation
      - template_generation
    brand_binding:
      field_type: metadata
      gamma_mapping: null
      note: Future compiler may translate brand constraints into additionalInstructions or theme checks.
    coherence_rules:
      field_type: metadata
      gamma_mapping: null
      note: Authoring-time validation rule for Dan/CD and the styleguide validator.
    provenance_source:
      field_type: metadata
      gamma_mapping: null
    provenance_notes:
      field_type: metadata
      gamma_mapping: null
