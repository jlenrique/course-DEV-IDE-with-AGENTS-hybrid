  classic-cards-fluid-visuals-magazine-ai-direction-detailed:
    status: captured_from_live_exemplar
    version: 1
    generation_method: classic_generation
    display_name: Classic-Cards_Fluid-Visuals_Magazine+AI-Direction_Detailed
    intended_use: Card-by-card Classic Gamma production for visual-led, data-and-structure-heavy narrated lesson screens.
    style_description: >-
      A high-density, editorial clinical strategy style that uses explicit card-by-card prompts and
      detailed visual-led instructions to make the slide visuals carry more of the explanatory load.
      Compared with Classic-Freeform_X-Cards, this style produces larger, more varied cards with a
      magazine-like mix of realistic healthcare photography, aerial/system imagery, chart panels,
      process diagrams, and infographic composites. Navy headings and teal body copy still preserve
      the HIL APC clinical tone, while muted olive callout cards, chart bars, and icons organize the
      analytic argument. Because the AI image model is left on auto-select, visual texture varies by
      card: some cards look photographic or cinematic, some become diagrammatic, and others become
      hybrid editorial infographics. That variety is a feature of this style when the lesson needs
      data, system structure, and human stakes to alternate without crowding the page.
    style_tradeoffs:
      pros:
      - Strong visual-led treatment for complex system arguments, charts, timelines, and structural healthcare themes.
      - Card-by-card partitioning preserves intentional content sequencing better than freeform condensation.
      - Magazine/editorial imagery gives the deck more client-ready presence and emotional range.
      - Auto-selected image model allows Gamma to choose different visual treatments for photos, charts, diagrams, and hybrid infographics.
      - Detailed additional instructions help align slide density, visual emphasis, and narration expectations.
      cons:
      - Auto-selected image model and Magazine art direction can create useful variety, but also less visual uniformity across cards.
      - Some generated/downloaded PNGs from this style were not 16:9, which caused downstream Descript composition/cropping problems in the concierge run.
      - More text and more complex layouts raise fidelity/perception burden; each card needs stronger visual inspection before publication.
      - Magazine/photo realism can introduce plausibility or artifact risks that are less common in simpler vector styles.
      - Detailed instructions are powerful but more brittle: conflicting or stale guidance can materially steer the output.
    theme:
      id: njim9kuhfnljvaa
      name: 2026 HIL APC Tejal
    live_example_url: "https://the-economic-structural--1t485b6.gamma.site/"
    studio_template: null
    prompt_editor:
      content_mode: card_by_card
      text_content:
        mode: generate
        amount: concise
        output_language: en-US
        write_for: ''
        tone: ''
      visuals:
        theme_id: njim9kuhfnljvaa
        theme_name: 2026 HIL APC Tejal
        image_source: aiGenerated
        art_style:
          ui_value: Magazine
          api_interpretation: custom_style_prompt
          note: Magazine is visible in the Gamma UI screenshot, but it is not one of the currently documented named API stylePreset values.
        image_model:
          ui_value: Auto-select model
          api_value: null
      format:
        type: presentation
        variant: default
        card_design_mode: classic
        requested_card_count: 18
      additional_instructions: >-
        Experience profile: visual-led. Creative rationale: This module's argument is carried
        by charts, infographics, and a timeline--data and structure are the protagonists across
        Slides 1-5, with a concise recap on 6. A visual-led profile lets the high-contrast
        visuals do the heavy lift while reserving a larger creative budget to humanize the story
        (burnout, consumer expectations) and connect system forces to leadership action without
        crowding slides. Source-grounded authority and a professional register match a clinician
        audience, and adaptive slide density with balanced coupling ensures voiceover can translate
        implications and enterprise navigation while the visuals anchor attention and retention.
      additional_instructions_capture:
        completeness: visible_screenshot_excerpt_plus_run_pattern
        note: The screenshot's Additional instructions field is taller than the visible capture; preserve exact full text from a future prompt-export receipt if available.
    prompt_configuration:
      text_content:
        mode: generate
        amount: medium
        audience: Clinician learners and clinical faculty evaluating health-system strategy and enterprise navigation, American English
        tone: Professional, source-grounded, visually analytical, clinician-facing
        language: en
      visuals:
        image_source: aiGenerated
        image_model: null
        style_preset: custom
        custom_style: Magazine editorial healthcare visuals; mix of realistic clinical photography, charts, diagrams, and polished infographic compositions.
        keywords:
        - magazine
        - editorial
        - clinical strategy
        - charts
        - infographics
        - professional healthcare photography
      format:
        type: presentation
        variant:
          value: default
          enforced: false
          note: Gamma UI format variant; not currently a live generate kwarg.
        card_split: inputTextBreaks
      generation:
        num_cards:
          value: 18
          note: Prompt editor screenshot shows 18 cards total with explicit card-by-card content.
      additional_instructions:
      - Experience profile: visual-led; let charts, infographics, and timeline/data structures carry the argument.
      - Use source-grounded authority and a professional clinician-facing register.
      - Preserve adaptive slide density: visuals anchor attention while voiceover translates implications and enterprise navigation.
    api_parameters:
      endpoint: /generations
      payload_provenance:
        exact_request_receipt_found: false
        note: >-
