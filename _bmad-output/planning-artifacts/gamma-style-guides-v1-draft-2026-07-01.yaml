style_guides:
  classic-freeform-x-cards:
    status: seed_from_existing
    version: 1
    generation_method: classic_generation
    display_name: Classic-Freeform_X-Cards
    intended_use: Classic Gamma freeform prompt-to-X-card production for HIL APC narrated lesson screens.
    style_description: >-
      A clean clinical-education presentation style that turns freeform source prose into a sequence of
      spacious, white-background cards with navy headings, teal body text, muted olive accents, and soft
      vector/illustration panels. The style favors concise on-screen gist over dense transcription: titles,
      two-column contrasts, three-part icon rows, numbered steps, and quote/key-message cards carry the
      visible structure while narration is expected to hold the fuller explanation. Minimal additional
      prompt guidance leaves the Tejal theme, Classic card design, AI-generated illustrated visuals, and
      freeform-to-10-card condensation to do most of the shaping. The resulting deck feels professional,
      calm, approachable, and APC/clinical-leadership oriented, with enough visual variety for a narrated
      lesson but not enough density to substitute for the voiceover.
    style_tradeoffs:
      pros:
      - Clean, calm, clinician-appropriate look with strong readability.
      - Good default for narrated lessons because the screen carries gist while VO carries detail.
      - Low prompt burden; theme and Classic layout do much of the visual shaping.
      - More visually consistent than auto-selected Magazine imagery because it leans on illustration/vector cues.
      cons:
      - Less dramatic and less editorial than the Magazine visual-led style.
      - Freeform condensation can flatten carefully planned per-card structure.
      - Default/Fluid page setup may require a separate publication-time 16:9 export policy for Descript/video workflows.
      - Sparse instructions may under-specify image/content treatment for unusually complex or data-heavy source material.
    theme:
      id: njim9kuhfnljvaa
      name: 2026 HIL APC Tejal
    live_example_url: "https://the-modern-clinicians-di-a6j7emh.gamma.site/"
    studio_template: null
    prompt_editor:
