        themeId: njim9kuhfnljvaa
        additionalInstructions: runtime_supplied_high_detail_visual_led_prompt
        textOptions:
          amount: medium
          tone: Professional, source-grounded, visually analytical, clinician-facing
          audience: Clinician learners and clinical faculty evaluating health-system strategy and enterprise navigation, American English
          language: en
        imageOptions:
