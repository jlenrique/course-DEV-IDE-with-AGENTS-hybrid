version: 1
notes: |
  Canonical specialist resolution for Marcus delegation. Paths are repo-relative.

  This registry has TWO complementary views:
  - `specialists:` map (legacy contract; 14 keys) — keyed by API/skill name; each entry has `path` to SKILL.md.
    Asserted by `tests/test_specialist_registry_contract.py` (REQUIRED_SPECIALISTS set of 14).
  - `personas:` map (post-Slab-7 enrichment, added 2026-05-07 per pre-Trial-3 cleanup S1 P0-3) —
    keyed by canonical specialist persona name; each entry surfaces the BMB sanctum directory,
    persona-skill SKILL.md, and (where applicable) API-mastery-skill SKILL.md per the
    Class-C two-SKILL.md convention ratified party-mode 4/4 unanimous Round-(f) 2026-04-29.

  Authoritative source: `docs/dev-guide/specialist-sanctum-alignment-matrix.md` (Slab 7b SG-4 final form, 2026-05-01).

  Class-D2 sanctum-path-equality EXEMPT per D20: Compositor uses `skills/compositor/SKILL.md`
  (NOT `bmad-agent-compositor/`) — canonical-not-exception.

  Per Slab 7b 7b.8 close (2026-05-01): the dissolved `bmad-agent-audra` was REPLACED by `bmad-agent-enrique`
  as the canonical Class-C two-SKILL.md ElevenLabs specialist. The `elevenlabs-specialist` legacy entry
  below STILL points to `skills/bmad-agent-elevenlabs/` (the API-mastery skill, unchanged); the
  persona behind it is now Enrique (NOT Audra). See `personas.enrique` block below.

