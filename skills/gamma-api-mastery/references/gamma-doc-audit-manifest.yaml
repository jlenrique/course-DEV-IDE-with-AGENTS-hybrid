  # ---- changelog canary (Amelia A-7) ----------------------------------------------

  - item_id: "doc-fact-changelog-canary"
    kind: "doc-fact"
    expected_documented: "\n# "
    doc_url: "https://developers.gamma.app/changelog/readme.md"
    comparator: "literal-presence"
    extraction: {}
    consequence: >-
      The changelog page is the woodshed-cycle early-warning surface
      (doc-sources.yaml refresh_protocol). This canary asserts it still serves
      markdown (a LINE-ANCHORED `# ` heading present); an empty/HTML/moved page
      means the refresh protocol is reading a dead surface.
    notes: >-
      Serving-markdown canary: whole-page scope, line-anchored heading literal
      "\n# " (P8 — the driver's line-anchor convention also matches a heading at
      byte 0; loose '#' characters in an HTML page can no longer confirm it, and
      the provider's content_type_not_markdown known_losses sentinel floors a
      200-HTML page to indeterminate). Not fixtured for the live changelog body —
      live-run only; a fetch failure classifies indeterminate.

  # ---- the labeled probe: live TEETH witness (John J-2 / Murat M-7) ---------------

  - item_id: "probe-absent-anchor-teeth"
    kind: "probe"
    expected_documented: "zz-leg-e-probe-literal-never-present"
    doc_url: "https://developers.gamma.app/guides/async-patterns-and-polling.md"
    comparator: "literal-presence"
    extraction:
      anchor: "#### zz-leg-e-probe-anchor-known-absent"
    consequence: >-
      Synthetic failure-state witness (Leg-D precedent): the anchor is KNOWN
      ABSENT, so a healthy audit classifies this drift-detected/doc-restructure
      with ZERO confirmed writes (S-2). A probe that CONFIRMS means the detection
      teeth are broken — the driver exits VOID (integrity failure).
