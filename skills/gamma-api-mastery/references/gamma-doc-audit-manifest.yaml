  - item_id: "finding-imageoptions-stylepreset-style-composition"
    kind: "doc-fact"
    expected_documented: "stylePreset"
    doc_url: "https://developers.gamma.app/guides/generate-api-parameters-explained.md"
    comparator: "literal-presence"
    extraction:
      anchor: "#### imageOptions"
      until: "#### cardOptions"
    findings_only: true
    consequence: >-
      Findings-only (J-7): is a stylePreset(+)style composition documented on the
