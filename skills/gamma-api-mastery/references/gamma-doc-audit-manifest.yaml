  # EVIDENCE ONLY (Dan D-7); these items NEVER write the ledger.

  - item_id: "finding-imageoptions-discrete-tags-field"
    kind: "doc-fact"
    expected_documented: "imageOptions.tags"
    doc_url: "https://developers.gamma.app/guides/generate-api-parameters-explained.md"
    comparator: "literal-presence"
    extraction:
      anchor: "#### imageOptions"
      until: "#### cardOptions"
    findings_only: true
