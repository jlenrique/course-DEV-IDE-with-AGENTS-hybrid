- 'Use of ''Turnitin'' (automated originality reporting tool):'
- Turnitin is used to prevent plagiarism and to help students identify how to properly
  attribute sources. It does so by comparing submitted assignments against a database
  of academic papers and internet information to identify areas of overlap between
  the submitted assignment and existing works, producing a "similarity report." The
  similarity score is a percentage of an assignment’s content that matches the searched
  databases. Students and faculty should analyze the results of the report to determine
  if plagiarism has occurred.
