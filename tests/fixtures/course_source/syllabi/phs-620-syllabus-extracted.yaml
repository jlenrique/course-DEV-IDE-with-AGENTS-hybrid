- 'Changes to Posted Syllabus:'
- Provided adequate advance notice is given to the class, the instructor reserves
  the right to modify the syllabus and class activities or requirements in order to
  enhance learning during the delivery of the course. Such modifications can include
  but are not limited to substitutions of certain journal articles or other periodical
  resources for others, changes to the details of particular assignments, rearrangement
  of group activities, or modification of class participation requirements. Any such
  changes will be designed so as not to unduly impact student schedules or the overall
  workload for the course.
- Chosen Name
- Some members of our community use a name, gender, and pronoun other than their legal
