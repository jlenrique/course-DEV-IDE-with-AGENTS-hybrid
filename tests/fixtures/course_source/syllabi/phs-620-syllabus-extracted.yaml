- - - 'Course Description:'
  - - Explores adult education principles and course design for a variety of learning
      environments. Evaluates strategies to boost learner satisfaction and retention,
      including 'backward design.' Emphasizes key design techniques and online tools.
      Identifies methods for assessing learning outcomes. Introduces the Quality Matters
      Rubric 5 Pillars of Quality and support resources for robust course creation
      and teaching effectiveness. Culminates in a Population Health lesson plan and
      group work on a collaborative, ongoing class project in educational technology
      for Population Health.
- - - 'Required Texts or Other Resources: Rapid Instructional Design. 3rd Edition.
      George M. Piskurich. Wiley. ISNB: 978-1118973974'
  - - 'Notes on Texts or Materials: The Piskurich textbook is available online through
      Scott Memorial Library: Rapid Instructional Design .'
- - - PLO-01
    - Develop an evidence-based lesson plan as part of an educational program for
      adult learners.
  - - PLO-02
    - Identify and address the needs of critical third-party stakeholders--such as
      accreditors, administrators, and other reviewers or clients--along with the
      needs of learners.
  - - PLO-03
    - Apply the 'Backward' design approach to lesson and course development for both
      online and classroom-based environments.
  - - PLO-04
    - Design and deliver an engaging presentation promoting learner satisfaction,
      retention of knowledge, and application.
  - - PLO-05
    - Efficiently assess and evaluate the learner's experience and achievement.
  - - PLO-06
    - Formulate timely, well-considered feedback and coaching to learners.
  - - PLO-07
    - Design a project in educational technology addressing a recognized need in Population
      Health.
  - - PLO-08
    - Develop a design through Alpha, Beta, and Final stages of completion.
  - - PLO-09
    - Validate a project's design, processes, and outputs.
  - - PLO-10
    - Implement an Ed Tech project in a specified environment.
  - - PLO-11
    - Evaluate user ineractions and learning experiences in terms of a project's interfaces,
      inputs, and outputs.
  - - PLO-12
    - Continuously improve and innovate teaching through critical self-reflection
      and evidence-based practice.
