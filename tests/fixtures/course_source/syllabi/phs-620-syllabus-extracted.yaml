- 'Evaluation and Grading:'
- Students can earn up to 250 points in this course by the end of the term. All graded
  activities in this course earn points as they are completed and graded. At the end
  of the term, each student's point total will be converted to a percentage based
  on the 250 point scale to determine the final course grade.
- Students who have earned all 250 points in a course will have a cumulative score
  of 100%. Students who have earned 225 points will have a 90% score, and so on. These
  percentages will then be converted to letter grades in keeping the College's standard
  grading scale.
- Grading criteria for certain assignments may be formalized into "grading rubrics."
  These rubrics can help students better understand how their work will be evaluated.
- Additional Administrative Policies
- Student Responsibility
- This course abides by all college and University policies. Students are responsible
  for knowing and adhering to policies in the College Handbook and University polices.
