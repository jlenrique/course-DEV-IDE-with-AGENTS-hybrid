- 'Attendance and Participation:'
- A significant part of your grade for this course will be based on attendance and
  participation. In our online learning environment, the attendance and participation
  take the form of your contributions to the discussions on the class Discussion Board
  and your contributions to the learning community.
- You will earn the most participation points by making regular, high-quality postings
  to the discussion forums, providing your feedback on the weekly '5-min. feedback'
  surveys, and submitting the final course evaluation. Responses to both weekly feedback
  and the final course evaluation are always kept confidential.
- 'Minimum participation requirements:'
- Each week or module, all participants must post to
- each
- discussion topic a minimum of
- three
- times. These postings must be made on at least two different days during the week/module.
  (You should not make all three postings on the same day.)
- 'First posting before midnight, Wednesday:'
- make your first post to the current week’s/module's discussion topics early---before
  midnight Wednesday. This posting is your original, individual response to each of
  the discussion questions presented for the week/module.
- 'Second posting before noon, Saturday:'
- make your second set of posts toward the end of the week/module or early on the
  weekend (before Saturday, noon). Respond to at least two of your classmates' postings
  in each of the week's/module's discussion forums.
- See the course points allocation table located on the last page/screen of the syllabus
  for the number of discussion forums in your course and their point value.
- 'Policy Regarding Late Work:'
- a. Our course is structured around weekly lessons or modules. A week/module is considered
  to
- begin on a Monday and end the following Sunday.
- Depending on your class schedule, some modules may span more than one week.
- i. All postings to discussions should be
- completed by midnight Sunday
- for the week/module that is ending. No points will be given for discussion postings
  not made by the close of the week/module (because your postings are meant to be
  read by others, and their value diminishes significantly once the class has moved
  on to the new week/module).
- ii. All assignments other than discussions
- are due by Sunday at midnight
- of the current week/module unless otherwise specified in an assignment's instructions.
  Always review each assignment's instructions for complete information about its
  submission requirements.
- 'The least flexible types of assignments, when it comes to completion dates, are:'
- 'Discussions: you need to keep pace with the class or else the class discussion
  fragments.'
- 'Pair or group work: you must not negatively impact the progress of your classmates.'
- 'Writing Standards (APA Guidelines):'
- 'Papers and other documents submitted as course work are to conform to APA style
  guidelines. These guidelines can be reviewed in the JCPH Canvas Onboarding training,
  where a model paper in general APA style can also be found:'
- APA Guidelines
- . APA conventions for the use of title pages, page formatting, in-text citations,
  the attribution of quotations, Reference lists, and all other elements of your documents
  must be adhered to in order to receive full credit on written assignments. This
  includes APA stylistics covering point of view, word choice, clarity and conciseness.
  Electronic sources and other non-print materials must be referenced per APA guidelines
  developed for that purpose.
- 'The only exceptions to this College policy are:'
- Instructors may substitute another style standard, such as that of the American
  Medical Association, for the APA standard so long as the alternative standard is
  equally comprehensive and equally a part of the evaluation of written work.
- Documents of less than 2000 words (excluding Reference list and any appendices)
  need not carry an Abstract or list of keywords.
- 'Use of AI Tools for Coursework:'
- The use of generative AI tools for coursework, including conducting analyses or
  creating content, is permitted only if explicitly approved by the instructor.
- In alignment with the College's commitment to academic integrity, students are expected
  to submit coursework that is genuinely their own. Each student is accountable for
  the academic integrity of their submitted work and for upholding privacy, confidentiality,
  and intellectual property rights.
- When granted permission by the instructor to use AI tools, students must adhere
  strictly to the instructor’s guidelines. This includes citing all AI-derived sources
  and producing all evidence of authenticity that may be called for by an assignment’s
  instructions. Such evidence may include drafts of work, prompts, scripts, screenshots,
  primary data, or other documentation.
- 'The College’s policy is based upon Jefferson University’s standards for ''Restricted
  Use'' of generative AI. For further details, see the policy statement:'
- 'Graduate Policies: Artificial Intelligence'
