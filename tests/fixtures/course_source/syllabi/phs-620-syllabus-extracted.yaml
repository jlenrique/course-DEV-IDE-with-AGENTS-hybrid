- 'TJU Academic Integrity Policy:'
- Academic Integrity is the foundation of all Jefferson teaching, learning, and professional
  endeavors and is vital to advancing a culture of fairness, trust and respect. All
  members of the University community must maintain respect for the intellectual efforts
  of others and be honest in their own work, words, and ideas.
