services:
  postgres:
    image: postgres:15
    container_name: migration-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      POSTGRES_DB: course_dev_ide_migration
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata_migration:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d course_dev_ide_migration"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata_migration: